---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <p>
    {{ page.date | date: "%Y-%m-%d" }}
    {% if page.categories and page.categories != empty %}
    - {{ page.categories | join: ", " }}
    {% endif %}
  </p>

  {{ content }}
</article>

<p><a href="{{ '/blog/' | relative_url }}">Back to Blog</a></p>
